# fly.toml — Fly.io deployment config
# Deploy with: fly launch → fly deploy

app = "madass-lead-engine"
primary_region = "dfw"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[env]
  PORT = "5000"
  DATA_DIR = "/app/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
